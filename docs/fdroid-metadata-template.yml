Builds:
  - versionName: '2.17.39'
    versionCode: 102
    commit: v2.17.39
    subdir: android
    sudo:
      - apt-get update
      - apt-get install -y nodejs npm openjdk-17-jdk-headless
    init:
      - cd ..
      - npm ci --legacy-peer-deps
    build:
      - export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
      - export PATH="$JAVA_HOME/bin:$PATH"
      - export SARAL_BUILD_TARGET=fdroid
      - bash gradlew assembleFdroidRelease --no-daemon
    output: app/build/outputs/apk/fdroid/release/app-fdroid-release-unsigned.apk
    scandelete:
      - node_modules

