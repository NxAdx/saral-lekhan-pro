License: MIT
AuthorName: NxAdx
WebSite: https://github.com/NxAdx/saral-lekhan-pro
SourceCode: https://github.com/NxAdx/saral-lekhan-pro
IssueTracker: https://github.com/NxAdx/saral-lekhan-pro/issues

RepoType: git
Repo: https://github.com/NxAdx/saral-lekhan-pro.git

Builds:
  - versionName: '2.17.33'
    versionCode: 100
    commit: v2.17.33
    subdir: android/app
    sudo:
      - apt-get update
      - apt-get install -y nodejs npm
    init:
      - cd ../..
      - npm install --legacy-peer-deps
    gradle:
      - release
    prebuild:
      - cd ../..
      - npx expo prebuild --platform android --clean

# Note: You may need to adjust build steps after F-Droid maintainers
# test the build on their servers. React Native/Expo apps might need
# additional configuration.

AutoUpdateMode: Version
UpdateCheckMode: Tags
CurrentVersion: '2.17.33'
CurrentVersionCode: 100

