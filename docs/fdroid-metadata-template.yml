Builds:
  - versionName: '2.17.34'
    versionCode: 101
    commit: v2.17.34
    subdir: android/app
    sudo:
      - apt-get update
      - apt-get install -y curl openjdk-17-jdk-headless
      - update-alternatives --auto java
      - curl -fsSL https://deb.nodesource.com/setup_18.x | bash -
      - apt-get install -y nodejs
    init:
      - cd ../..
      - npm install --legacy-peer-deps
    gradle:
      - release
    prebuild:
      - cd ../..
      - npx expo prebuild --platform android --clean
    scanignore:
      - node_modules

