<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>सरल लेखन - Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Hind:wght@300;400;500;600;700&family=Vesper+Libre:wght@400;500;700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:         #D9D7D2;
  --bg-raised:  #E2E0DB;
  --bg-deep:    #C8C6C1;
  --stroke:     #2B2926;
  --stroke-dim: #9B9790;
  --ink:        #1C1A17;
  --ink-mid:    #5A5751;
  --ink-dim:    #8E8B85;
  --accent:     #C14E28;
  --accent-dim: #E8866A;
  --accent-bg:  #F2D5C8;
  --white:      #F5F3EF;

  --font-devanagari: 'Hind', 'Vesper Libre', serif;
  --font-display:    'Vesper Libre', 'Hind', serif;
  --font-mono:       'DM Mono', monospace;

  --r-pill: 9999px;
  --r-xl:   28px;
  --r-lg:   20px;
  --r-circle: 50%;

  --shadow-raised: 2px 3px 0px #B0AEA9, inset 0 1px 0 rgba(255,255,255,.15);
  --shadow-inset:  inset 1px 2px 4px rgba(0,0,0,.10);
  --shadow-float:  0 8px 24px rgba(30,28,24,.18), 0 2px 4px rgba(30,28,24,.10);
  --shadow-pill:   3px 4px 0px #B0AEA9;

  --sw: 1.5px;
  --sw-thick: 2.5px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-devanagari);
  background: #BFBDBA;
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  gap: 40px;
  padding: 40px;
}
/* App Container */
.app-mockup {
  background: var(--bg);
  border: var(--sw) solid var(--stroke);
  border-radius: 40px;
  overflow: hidden;
  width: 320px;
  height: 640px;
  box-shadow: var(--shadow-float);
  display: flex;
  flex-direction: column;
  position: relative;
}
/* Header */
.mockup-header {
  padding: 24px 20px 16px;
  text-align: center;
}
.mockup-appname {
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 900;
  color: var(--ink);
  letter-spacing: -.03em;
}
.mockup-appname-sub {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  color: var(--accent);
  text-transform: uppercase;
}
/* Search */
.mockup-search {
  margin: 0 20px 16px;
  background: var(--bg-deep);
  border: var(--sw) solid var(--stroke);
  border-radius: var(--r-pill);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: var(--shadow-inset);
  cursor: text;
}
.mockup-search svg {
  width: 16px; height: 16px;
  stroke: var(--ink-dim);
  stroke-width: 2; fill: none;
}
/* Tags */
.tags-row {
  display: flex;
  gap: 8px;
  padding: 0 20px 16px;
  overflow-x: auto;
  scrollbar-width: none;
}
.tag-pill {
  font-size: 11px; font-weight: 600; padding: 6px 14px;
  border-radius: var(--r-pill); border: var(--sw) solid var(--stroke);
  background: var(--bg); color: var(--ink-mid); cursor: pointer;
  box-shadow: 1px 2px 0px #B0AEA9; transition: all .1s; white-space: nowrap;
}
.tag-pill:active { transform: translateY(1px); box-shadow: 0px 1px 0px #B0AEA9; }
.tag-pill.active { background: var(--accent); color: var(--white); border-color: #8B3118; box-shadow: 1px 2px 0px #8B3118; }

/* Feed */
.mockup-feed {
  padding: 0 20px 80px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  overflow-y: auto;
  flex: 1;
}
/* Note Card */
.note-pill {
  background: var(--bg);
  border: var(--sw-thick) solid var(--stroke);
  border-radius: var(--r-pill);
  padding: 16px 20px;
  box-shadow: var(--shadow-pill);
  transition: transform .15s, box-shadow .15s;
  cursor: pointer;
}
.note-pill:hover { transform: translateY(-2px); box-shadow: 4px 6px 0px #A8A6A1; }
.note-pill:active { transform: translateY(1px); box-shadow: 1px 2px 0px #A8A6A1; }
.note-pill-title { font-size: 16px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
.note-pill-preview { font-size: 13px; color: var(--ink-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.note-pill-meta { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
.note-pill-date { font-family: var(--font-mono); font-size: 10px; color: var(--ink-dim); }
.note-pill-tag { font-size: 10px; font-weight: 600; background: var(--accent-bg); color: var(--accent); border: 1px solid var(--accent-dim); border-radius: var(--r-pill); padding: 2px 8px; }

/* FAB */
.fab-container {
  position: absolute;
  bottom: 24px;
  right: 24px;
}
.fab {
  width: 56px; height: 56px;
  border-radius: var(--r-circle);
  background: var(--accent); border: 2px solid #8B3118;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; box-shadow: 3px 4px 0px #8B3118, var(--shadow-float);
  color: var(--white); transition: all .1s;
}
.fab:active { transform: translateY(2px); box-shadow: 1px 2px 0px #8B3118; }
.fab svg { width: 24px; height: 24px; stroke: currentColor; stroke-width: 2.5; fill: none; }

/* EDITOR VIEW mockup */
.editor-mockup {
  background: var(--bg); border: var(--sw) solid var(--stroke); border-radius: 40px;
  width: 320px; height: 640px; box-shadow: var(--shadow-float);
  display: flex; flex-direction: column; position: relative;
}
.editor-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 24px 20px 16px; border-bottom: var(--sw) solid rgba(43,41,38,.1);
}
.back-btn { width: 36px; height: 36px; border-radius: 50%; border: var(--sw) solid var(--stroke); display: flex; align-items: center; justify-content: center; box-shadow: 1px 2px 0px #B0AEA9; cursor: pointer; background: var(--bg-raised); }
.back-btn:active { transform: translateY(1px); box-shadow: none; }
.editor-date { font-family: var(--font-mono); font-size: 11px; color: var(--ink-dim); }
.editor-body {
  padding: 24px 20px; flex: 1; display: flex; flex-direction: column; gap: 16px;
}
.editor-title { font-family: var(--font-display); font-size: 28px; font-weight: 700; color: var(--ink); border: none; background: transparent; outline: none; resize: none; width: 100%; overflow:hidden;}
.editor-title::placeholder { color: var(--ink-dim); }
.editor-content { font-family: var(--font-devanagari); font-size: 16px; line-height: 1.7; color: var(--ink-mid); border: none; background: transparent; outline: none; resize: none; flex: 1; width: 100%; }
.editor-toolbar {
  padding: 12px 16px; background: var(--bg-raised); border-top: var(--sw) solid var(--stroke);
  display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
}
.tool-btn {
  padding: 8px 12px; border: var(--sw) solid var(--stroke); border-radius: 12px;
  background: var(--bg); font-family: var(--font-devanagari); font-size: 14px; font-weight: 500;
  box-shadow: 1px 2px 0px #B0AEA9; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.tool-btn:active { transform: translateY(1px); box-shadow: none; }
</style>
</head>
<body>

<!-- HOME SCREEN -->
<div class="app-mockup">
  <div class="mockup-header">
    <div class="mockup-appname">सरल लेखन</div>
    <div class="mockup-appname-sub">Notes Experience</div>
  </div>
  
  <div class="mockup-search">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    <div style="font-size: 14px; color: var(--ink-dim);">खोजें...</div>
  </div>

  <div class="tags-row">
    <div class="tag-pill active">सभी</div>
    <div class="tag-pill">विचार</div>
    <div class="tag-pill">कार्य</div>
    <div class="tag-pill">कविता</div>
  </div>

  <div class="mockup-feed">
    <div class="note-pill">
      <div class="note-pill-title">आज के विचार</div>
      <div class="note-pill-preview">जीवन एक यात्रा है, इसे जीना सीखें...</div>
      <div class="note-pill-meta">
        <span class="note-pill-date">OCT 12</span>
        <span class="note-pill-tag">विचार</span>
      </div>
    </div>
    <div class="note-pill">
      <div class="note-pill-title">परियोजना योजना</div>
      <div class="note-pill-preview">कल की बैठक के लिए मुख्य बिंदु तैयार करें...</div>
      <div class="note-pill-meta">
        <span class="note-pill-date">OCT 10</span>
        <span class="note-pill-tag">कार्य</span>
      </div>
    </div>
    <div class="note-pill">
      <div class="note-pill-title">किताबों की सूची</div>
      <div class="note-pill-preview">1. गोदान - प्रेमचंद, 2. रश्मिरथी - दिनकर...</div>
      <div class="note-pill-meta">
        <span class="note-pill-date">OCT 08</span>
        <span class="note-pill-tag">सूची</span>
      </div>
    </div>
  </div>

  <div class="fab-container">
    <div class="fab">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </div>
  </div>
</div>

<!-- EDITOR SCREEN -->
<div class="editor-mockup">
  <div class="editor-header">
    <div class="back-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </div>
    <div class="editor-date">OCT 14, 2023</div>
    <div class="back-btn" style="background: var(--bg);">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
    </div>
  </div>
  <div class="editor-body">
    <textarea class="editor-title" rows="1" placeholder="शीर्षक..."></textarea>
    <textarea class="editor-content" placeholder="यहाँ लिखना शुरू करें..."></textarea>
  </div>
  <div class="editor-toolbar">
    <div class="tool-btn"><b>B</b></div>
    <div class="tool-btn"><i>I</i></div>
    <div class="tool-btn"><u>U</u></div>
    <div class="tool-btn">।</div>
    <div class="tool-btn">॥</div>
    <div class="tool-btn" style="color: var(--accent); border-color: var(--accent);">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
    </div>
  </div>
</div>

</body>
</html>
