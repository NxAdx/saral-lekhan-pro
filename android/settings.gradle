rootProject.name = 'Saral Lekhan'

def resolvePackage(packageName) {
    try {
        def command = ["node", "--print", "require.resolve('${packageName}/package.json')"].execute(null, rootDir)
        command.waitFor()
        def path = command.text.trim()
        if (path) return path
    } catch (Exception e) {}
    
    // Fallback search
    def fallback = new File(rootDir, "../node_modules/${packageName}/package.json")
    if (fallback.exists()) return fallback.absolutePath
    
    throw new GradleException("Could not resolve ${packageName}. Run 'npm install'.")
}

apply from: new File(resolvePackage('expo'), "../scripts/autolinking.gradle")
useExpoModules()

apply from: new File(resolvePackage('@react-native-community/cli-platform-android'), "../native_modules.gradle")
applyNativeModulesSettingsGradle(settings)

include ':app'
includeBuild(new File(resolvePackage('@react-native/gradle-plugin')).getParentFile())
