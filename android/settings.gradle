rootProject.name = 'Saral Lekhan'

def resolvePackagePath(String packageName) {
    // 1. Try standard Node resolution
    try {
        def command = ["node", "--print", "require.resolve('${packageName}/package.json')"].execute(null, rootDir)
        command.waitFor()
        def path = command.text.trim()
        if (path && new File(path).exists()) return path
    } catch (Exception e) {}

    // 2. Fallback: Search up from settingsDir
    def currentDir = settingsDir
    while (currentDir != null) {
        def potentialPath = new File(currentDir, "node_modules/${packageName}/package.json")
        if (potentialPath.exists()) return potentialPath.absolutePath
        currentDir = currentDir.parentFile
    }

    // 3. Fallback: Check common CI paths
    def commonCiPath = new File("/home/runner/work/saral-lekhan-pro/saral-lekhan-pro/node_modules/${packageName}/package.json")
    if (commonCiPath.exists()) return commonCiPath.absolutePath

    throw new GradleException("CRITICAL: Could not resolve package '${packageName}'. Ensure 'npm install' has been run in the project root.")
}

def expoPath = resolvePackagePath('expo')
apply from: new File(expoPath, "../scripts/autolinking.gradle")
useExpoModules()

def rnCommunityCliPath = resolvePackagePath('@react-native-community/cli-platform-android')
apply from: new File(rnCommunityCliPath, "../native_modules.gradle")
applyNativeModulesSettingsGradle(settings)

include ':app'

def rnGradlePluginPath = resolvePackagePath('@react-native/gradle-plugin')
includeBuild(new File(rnGradlePluginPath).getParentFile())
