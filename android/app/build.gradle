apply plugin: "com.android.application"
apply plugin: "com.facebook.react"

import groovy.json.JsonSlurper

def projectRoot = rootDir.getAbsoluteFile().getParentFile().getAbsolutePath()
def packageJson = new JsonSlurper().parse(file("${projectRoot}/package.json"))
def appVersionName = packageJson.version?.toString() ?: "1.0.0"
def appVersionCode = packageJson.androidVersionCode ? Integer.parseInt(packageJson.androidVersionCode.toString()) : 1

def getNativeModulesScript() {
    def envPath = System.getenv("RN_NATIVE_MODULES_SCRIPT")
    if (envPath && new File(envPath).exists()) return envPath
    
    // Fallback using node resolution (same as standard RN template)
    try {
        return ["node", "--print", "require.resolve('@react-native-community/cli-platform-android/package.json')"].execute(null, rootDir).text.trim().replace("package.json", "native_modules.gradle")
    } catch (Exception e) {
        return "../node_modules/@react-native-community/cli-platform-android/native_modules.gradle"
    }
}

react {
    entryFile = file(["node", "-e", "require('expo/scripts/resolveAppEntry')", projectRoot, "android", "absolute"].execute(null, rootDir).text.trim())
    reactNativeDir = new File(["node", "--print", "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim()).getParentFile().getAbsoluteFile()
    hermesCommand = new File(["node", "--print", "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim()).getParentFile().getAbsolutePath() + "/sdks/hermesc/%OS-BIN%/hermesc"
    codegenDir = new File(["node", "--print", "require.resolve('@react-native/codegen/package.json')"].execute(null, rootDir).text.trim()).getParentFile().getAbsoluteFile()

    cliFile = new File(["node", "--print", "require.resolve('@expo/cli')"].execute(null, rootDir).text.trim())
    bundleCommand = "export:embed"
}

def enableProguardInReleaseBuilds = (findProperty('android.enableProguardInReleaseBuilds') ?: false).toBoolean()
def jscFlavor = 'org.webkit:android-jsc:+'

android {
    ndkVersion rootProject.ext.ndkVersion
    compileSdkVersion rootProject.ext.compileSdkVersion
    namespace 'com.sarallekhan'

    def buildTarget = System.getenv("SARAL_BUILD_TARGET") ?: "direct"
    def isFdroid = buildTarget == "fdroid"

    defaultConfig {
        applicationId 'com.sarallekhan'
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode appVersionCode
        versionName appVersionName

        buildConfigField("boolean", "REACT_NATIVE_UNSTABLE_USE_RUNTIME_SCHEDULER_ALWAYS", (findProperty("reactNative.unstable_useRuntimeSchedulerAlways") ?: true).toString())
        buildConfigField "boolean", "IS_FDROID_BUILD", "${isFdroid}"
        buildConfigField "String", "BUILD_CHANNEL", "\"${buildTarget}\""
        buildConfigField "String", "UPDATER_MODE", isFdroid ? "\"fdroid\"" : "\"github\""
        buildConfigField "String", "RUNTIME_FLAGS_URL", isFdroid ? "\"\"" : "\"https://raw.githubusercontent.com/NxAdx/saral-lekhan-pro/main/runtime-flags.json\""
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            def uploadStoreFile = (project.findProperty('MYAPP_UPLOAD_STORE_FILE') ?: System.getenv('MYAPP_UPLOAD_STORE_FILE'))?.toString()?.trim()
            def uploadStorePassword = (project.findProperty('MYAPP_UPLOAD_STORE_PASSWORD') ?: System.getenv('MYAPP_UPLOAD_STORE_PASSWORD'))?.toString()?.trim()
            def uploadKeyAlias = (project.findProperty('MYAPP_UPLOAD_KEY_ALIAS') ?: System.getenv('MYAPP_UPLOAD_KEY_ALIAS'))?.toString()?.trim()
            def uploadKeyPassword = (project.findProperty('MYAPP_UPLOAD_KEY_PASSWORD') ?: System.getenv('MYAPP_UPLOAD_KEY_PASSWORD'))?.toString()?.trim()

            if (uploadStoreFile && uploadStorePassword && uploadKeyAlias && uploadKeyPassword) {
                storeFile file(uploadStoreFile)
                storePassword uploadStorePassword
                keyAlias uploadKeyAlias
                keyPassword uploadKeyPassword
            } else {
                storeFile file('release.keystore')
                storePassword System.getenv('ANDROID_STORE_PASSWORD')
                keyAlias System.getenv('ANDROID_KEY_ALIAS')
                keyPassword System.getenv('ANDROID_KEY_PASSWORD') ?: System.getenv('ANDROID_STORE_PASSWORD')
            }
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.release
            shrinkResources (findProperty('android.enableShrinkResourcesInReleaseBuilds')?.toBoolean() ?: false)
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
    lintOptions {
        checkReleaseBuilds false
        abortOnError false
    }
}

dependencies {
    implementation("com.facebook.react:react-android")

    def frescoVersion = rootProject.ext.frescoVersion
    implementation("com.facebook.fresco:fresco:${frescoVersion}")
    implementation("com.facebook.fresco:imagepipeline-okhttp3:${frescoVersion}")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

apply from: new File(getNativeModulesScript());
applyNativeModulesAppBuildGradle(project)
