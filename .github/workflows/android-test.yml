name: Android Testing Build

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Install dependencies
        run: npm ci

      - name: Build direct debug APK
        run: |
          cd android
          bash gradlew assembleDirectDebug --no-daemon

      - name: Upload testing APK
        uses: actions/upload-artifact@v4
        with:
          name: saral-lekhan-direct-debug-apk
          path: android/app/build/outputs/apk/direct/debug/app-direct-debug.apk
