name: Production Android Build

on:
  push:
    branches: [ "main", "release/*" ]
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  build:
    name: Build Android App Bundle (AAB)
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 3. Setup Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: 4. Install Dependencies & Native Prebuild
        run: |
          npm ci
          npx expo prebuild --platform android --clean

      - name: 5. Secure Secrets Injection & Native Patches
        run: |
          # Inject Secrets AFTER the clean prebuild
          echo "${{ secrets.GOOGLE_SERVICES_JSON }}" > android/app/google-services.json
          
          # Decode Base64 Keystore into binary file
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore
          
          # Patch MainApplication.java for production bundler
          sed -i 's/return ".expo\/.virtual-metro-entry";/return "index";/' android/app/src/main/java/com/sarallekhan/MainApplication.java
          
          # Patch android/build.gradle to enforce Java 17 compilation
          sed -i '/allprojects {/a \    tasks.withType(JavaCompile).configureEach {\n        sourceCompatibility = JavaVersion.VERSION_17\n        targetCompatibility = JavaVersion.VERSION_17\n    }' android/build.gradle
          
          # Fix missing splashscreen_background resource crash
          sed -i '/<\/resources>/i \  <color name="splashscreen_background">#ffffff</color>' android/app/src/main/res/values/colors.xml

      - name: 6. Build Production Bundle (AAB) & APK
        working-directory: ./android
        run: ./gradlew bundleRelease assembleRelease --no-daemon
        env:
          MYAPP_UPLOAD_STORE_FILE: release.keystore
          MYAPP_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          MYAPP_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: 7. Upload Build Artifact (Google Play AAB)
        uses: actions/upload-artifact@v4
        with:
          name: saral-lekhan-production-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 7

      - name: 8. Upload Testable APK
        uses: actions/upload-artifact@v4
        with:
          name: saral-lekhan-production-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
