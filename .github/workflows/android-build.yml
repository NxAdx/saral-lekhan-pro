name: Production Android Build

on:
  push:
    branches: [ "main", "release/*" ]
    tags: [ "v*.*.*" ]
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  build:
    name: Build Android App Bundle (AAB)
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 3. Setup Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: 4. Install Dependencies & Native Prebuild
        run: |
          npm ci
          npx expo prebuild --platform android --clean

      - name: 5. Secure Secrets Injection & Native Patches
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          # Inject Secrets AFTER the clean prebuild
          cat <<< "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          
          # Decode Base64 Keystore into binary file
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore
          
          # Patch MainApplication.java for production bundler
          sed -i 's/return ".expo\/.virtual-metro-entry";/return "index";/' android/app/src/main/java/com/sarallekhan/MainApplication.java
          
          # Patch styles.xml to eliminate cold boot 5ms white flash by natively forcing the base window
          sed -i 's/<style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">/<style name="AppTheme" parent="Theme.AppCompat.Light.NoActionBar">\n        <item name="android:windowBackground">@color\/splashscreen_background<\/item>/' android/app/src/main/res/values/styles.xml
          
          # Patch android/build.gradle to enforce Java 17 compilation and add Google Services classpath
          sed -i '/allprojects {/a \    tasks.withType(JavaCompile).configureEach {\n        sourceCompatibility = JavaVersion.VERSION_17\n        targetCompatibility = JavaVersion.VERSION_17\n    }' android/build.gradle
          sed -i '/dependencies {/a \        classpath("com.google.gms:google-services:4.4.1")' android/build.gradle
          
          # Patch android/app/build.gradle to aggressively apply the Google Services plugin at the very bottom
          echo "" >> android/app/build.gradle
          echo "apply plugin: 'com.google.gms.google-services'" >> android/app/build.gradle
          
      - name: 6. Build Production Bundle (AAB) & APK
        working-directory: ./android
        run: |
          # Print the SHA-1 of the Release Keystore so the developer can easily copy it to Firebase
          echo "=========================================================="
          echo "🔥 RELEASE KEYSTORE SHA-1 FINGERPRINT (ADD THIS TO FIREBASE):"
          keytool -list -v -keystore app/release.keystore -alias "${{ secrets.ANDROID_KEY_ALIAS }}" -storepass "${{ secrets.ANDROID_STORE_PASSWORD }}" | grep SHA1
          echo "=========================================================="
          
          ./gradlew bundleRelease assembleRelease --no-daemon
        env:
          MYAPP_UPLOAD_STORE_FILE: release.keystore
          MYAPP_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          MYAPP_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: 7. Upload Build Artifact (Google Play AAB)
        uses: actions/upload-artifact@v4
        with:
          name: saral-lekhan-production-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 7

      - name: 8. Upload Testable APK
        uses: actions/upload-artifact@v4
        with:
          name: saral-lekhan-production-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7

      - name: 9. Publish APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
