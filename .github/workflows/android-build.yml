name: Production Android Build

on:
  push:
    branches: ["main", "release/*"]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build direct Android release artifacts
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Install dependencies
        run: |
          for i in 1 2 3; do npm ci && break || sleep 5; done

      - name: Decode Android keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Debug Paths
        run: |
          pwd
          ls -la
          find . -maxdepth 2 -name "node_modules"
          ls -la node_modules/expo/package.json || echo "expo not found"

      - name: Read version from package.json
        id: get_version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Build direct release AAB and APK
        run: npm run build:android:direct
        env:
          MYAPP_UPLOAD_STORE_FILE: release.keystore
          MYAPP_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          MYAPP_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload direct release AAB
        uses: actions/upload-artifact@v4
        with:
          name: saral-lekhan-direct-aab
          path: android/app/build/outputs/bundle/directRelease/app-direct-release.aab
          retention-days: 7

      - name: Upload direct release APK
        uses: actions/upload-artifact@v4
        with:
          name: saral-lekhan-direct-apk
          path: android/app/build/outputs/apk/direct/release/app-direct-release.apk
          retention-days: 7

      - name: Publish APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/direct/release/app-direct-release.apk
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
