name: Production Android Build

on:
  push:
    branches: [ "main", "release/*" ]
    tags: [ "v*.*.*" ]
  workflow_dispatch: # Allows manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  build:
    name: Build Android App Bundle (AAB)
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 3. Setup Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: 4. Install Dependencies
        run: |
          npm ci

      - name: 5. Secure Secrets Injection
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          # Validate google-services secret before writing file to avoid broken OAuth builds.
          python3 - <<'PY'
          import json
          import os

          payload = json.loads(os.environ["GOOGLE_SERVICES_JSON"])
          client = payload["client"][0]
          package_name = client["client_info"]["android_client_info"]["package_name"]
          if package_name != "com.sarallekhan":
              raise SystemExit(f"Invalid package in GOOGLE_SERVICES_JSON: {package_name}")

          oauth_clients = client.get("oauth_client", [])
          has_web_client = any(item.get("client_type") == 3 for item in oauth_clients)
          if not has_web_client:
              raise SystemExit("GOOGLE_SERVICES_JSON is missing OAuth web client (client_type=3).")
          print("google-services.json validation passed.")
          PY

          # Inject secrets
          cat <<< "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
          
          # Decode Base64 Keystore into binary file
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore
          
      - name: 6. Build Production Bundle (AAB) & APK
        working-directory: ./android
        run: |
          chmod +x ./gradlew

          # Print the SHA-1 of the Release Keystore so the developer can easily copy it to Firebase
          echo "=========================================================="
          echo "🔥 RELEASE KEYSTORE FINGERPRINTS (ADD BOTH TO FIREBASE):"
          keytool -list -v -keystore app/release.keystore -alias "${{ secrets.ANDROID_KEY_ALIAS }}" -storepass "${{ secrets.ANDROID_STORE_PASSWORD }}" | grep -E "SHA1|SHA256"
          echo "=========================================================="
          
          ./gradlew bundleRelease assembleRelease --no-daemon
        env:
          MYAPP_UPLOAD_STORE_FILE: release.keystore
          MYAPP_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          MYAPP_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          MYAPP_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: 7. Upload Build Artifact (Google Play AAB)
        uses: actions/upload-artifact@v4
        with:
          name: saral-lekhan-production-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 7

      - name: 8. Upload Testable APK
        uses: actions/upload-artifact@v4
        with:
          name: saral-lekhan-production-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7

      - name: 9. Publish APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
