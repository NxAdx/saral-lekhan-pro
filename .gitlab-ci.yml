# GitLab CI/CD pipeline for the saral-lekhan Expo/React Native Android app.
# Mirrors the existing .github/workflows (android-test.yml & android-build.yml).
#
# Required CI/CD variables (Settings > CI/CD > Variables), masked/protected:
#   ANDROID_KEYSTORE_BASE64  - base64 of your release keystore
#   ANDROID_KEY_ALIAS
#   ANDROID_STORE_PASSWORD
#   ANDROID_KEY_PASSWORD

image: reactnativecommunity/react-native-android:v13.0

stages:
  - test
  - build
  - release

variables:
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"

# Cache npm + gradle dependencies across runs to speed up builds.
cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - node_modules/
    - .gradle/

.node_setup: &node_setup
  - export NVM_DIR="$HOME/.nvm" && [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh" || true
  - node --version
  - java -version

# ---------------------------------------------------------------------------
# Test build: direct debug APK on merge requests (mirrors android-test.yml)
# ---------------------------------------------------------------------------
test:direct-debug-apk:
  stage: test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
  before_script:
    - *node_setup
    - npm ci
  script:
    - cd android
    - bash gradlew assembleDebug --no-daemon
  artifacts:
    name: "saral-lekhan-debug-apk"
    paths:
      - android/app/build/outputs/apk/debug/app-debug.apk
    expire_in: 7 days

# ---------------------------------------------------------------------------
# Production build: signed release AAB + APK (mirrors android-build.yml)
# Runs on main, release/* branches, version tags, and manual web runs.
# ---------------------------------------------------------------------------
build:direct-release:
  stage: build
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH =~ /^release\/.*$/'
    - if: '$CI_PIPELINE_SOURCE == "web"'
  before_script:
    - *node_setup
    - npm install
    - echo "$ANDROID_KEYSTORE_BASE64" | base64 -d -i > android/app/release.keystore
  script:
    - export MYAPP_UPLOAD_STORE_FILE=release.keystore
    - export MYAPP_UPLOAD_KEY_ALIAS="$ANDROID_KEY_ALIAS"
    - export MYAPP_UPLOAD_STORE_PASSWORD="$ANDROID_STORE_PASSWORD"
    - export MYAPP_UPLOAD_KEY_PASSWORD="$ANDROID_KEY_PASSWORD"
    - npm run build:android:direct
  artifacts:
    name: "saral-lekhan-release-$CI_COMMIT_REF_SLUG"
    paths:
      - android/app/build/outputs/bundle/release/app-release.aab
      - android/app/build/outputs/apk/release/app-release.apk
    expire_in: 7 days

# ---------------------------------------------------------------------------
# Publish the release APK/AAB as a GitLab Release on version tags.
# (mirrors the softprops/action-gh-release step)
# ---------------------------------------------------------------------------
release:publish:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
  needs:
    - job: build:direct-release
      artifacts: true
  script:
    - echo "Creating GitLab Release for $CI_COMMIT_TAG"
  release:
    tag_name: "$CI_COMMIT_TAG"
    name: "Release $CI_COMMIT_TAG"
    description: "Automated release for $CI_COMMIT_TAG. APK/AAB available in the build:direct-release job artifacts."
